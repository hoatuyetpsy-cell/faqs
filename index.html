<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm: Kỹ Năng Điều Hòa Cảm Xúc Nơi Công Sở</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Gray 100 */
        }
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-8 flex justify-center">
        <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-full max-h-[800px]">
            
            <!-- Quiz Header -->
            <div class="bg-teal-50 p-6 sm:p-8 border-b border-teal-100 flex justify-between items-start gap-4">
                <div>
                    <h2 class="text-xl sm:text-2xl font-bold text-teal-800 mb-2">Kỹ Năng Làm Chủ Cảm Xúc</h2>
                    <p class="text-teal-600">Thực hành thấu hiểu nội tâm với kỹ năng STOP và SBNRR.</p>
                </div>
                <img src="https://hoatuyetpsy-cell.github.io/faqs/avatar-sm.png" alt="Giáo viên" class="w-12 h-12 sm:w-16 sm:h-16 rounded-full border-2 border-teal-200 shadow-sm object-cover flex-shrink-0">
            </div>

            <!-- Quiz Content Container -->
            <div id="quiz-container" class="flex-1 overflow-y-auto p-6 sm:p-8 relative">
                <!-- Question Section -->
                <div id="question-section" class="transition-opacity duration-300">
                    <div class="flex justify-between items-center mb-6">
                        <span id="question-counter" class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Câu 1 / 7</span>
                        <!-- Progress Bar -->
                        <div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-teal-500 transition-all duration-300" style="width: 14%;"></div>
                        </div>
                    </div>

                    <h3 id="question-text" class="text-xl font-medium text-gray-800 mb-6 leading-relaxed">
                        <!-- Question text will be injected here -->
                    </h3>

                    <!-- Options -->
                    <div id="options-container" class="space-y-3">
                        <!-- Options will be injected here -->
                    </div>

                    <!-- Feedback Section (Hidden initially) -->
                    <div id="feedback-section" class="hidden mt-8 p-6 rounded-xl border-l-4 transition-all duration-300">
                        <h4 id="feedback-title" class="text-lg font-bold mb-2 flex items-center">
                            <!-- Feedback icon and title will be injected here -->
                        </h4>
                        <p id="feedback-rationale" class="text-gray-700 leading-relaxed mb-4">
                            <!-- Rationale text will be injected here -->
                        </p>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="flex justify-between items-center mt-8 pb-4" id="navigation-section">
                        <button id="prev-button" onclick="prevQuestion()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition-colors focus:ring-4 focus:ring-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                            Câu trước
                        </button>
                        <button id="next-button-nav" onclick="nextQuestion()" class="px-6 py-2 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-lg transition-colors focus:ring-4 focus:ring-gray-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Câu tiếp
                        </button>
                    </div>
                </div>

                <!-- Feedback Section (Hidden initially) -->
                <div id="feedback-section" class="hidden mt-8 p-6 rounded-xl border-l-4 transition-all duration-300">
                    <h4 id="feedback-title" class="text-lg font-bold mb-2 flex items-center">
                        <!-- Feedback icon and title will be injected here -->
                    </h4>
                    <p id="feedback-rationale" class="text-gray-700 leading-relaxed mb-4">
                        <!-- Rationale text will be injected here -->
                    </p>
                </div>
                
                <!-- Final Result Section (Hidden initially) -->
                <div id="result-section" class="hidden text-center py-12">
                     <div class="inline-flex items-center justify-center w-20 h-20 bg-teal-100 text-teal-600 rounded-full mb-6">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="text-3xl font-bold text-gray-800 mb-4">Hoàn thành xuất sắc!</h3>
                    <p class="text-lg text-gray-600 mb-8 max-w-md mx-auto">Bạn đã dành thời gian để thấu hiểu bản thân. Nhớ rằng, điều hòa cảm xúc là một hành trình luyện tập mỗi ngày.</p>
                    <button onclick="restartQuiz()" class="px-8 py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-colors shadow-lg hover:shadow-xl">
                        Thực hành lại
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        const quizData = [
            {
                question: "Trong một cuộc họp, sếp bất ngờ phê bình ý tưởng của bạn trước mặt toàn nhóm. Bạn cảm thấy nhịp tim tăng nhanh, mặt nóng bừng lên, hơi thở gấp gáp và có một thôi thúc muốn phản bác lại ngay lập tức. Dấu hiệu này giúp bạn xác định mình đang trải qua cảm xúc nào rõ rệt nhất?",
                options: [
                    { text: "Sự tức giận hoặc bức xúc.", rationale: "Tuyệt vời, bạn đã gọi tên rất chính xác. Nhịp tim nhanh, nhiệt độ cơ thể tăng và mong muốn phản kháng là những đặc trưng sinh lý và tâm lý cơ bản nhất của sự tức giận.", isCorrect: true },
                    { text: "Sự lo âu, hoảng sợ.", rationale: "Sự căng thẳng của tình huống này rất dễ làm ta liên tưởng đến sự lo âu, đó là một suy đoán rất hợp lý. Tuy nhiên, xu hướng 'muốn phản bác lại' thường nghiêng về sự phòng vệ của tức giận nhiều hơn là lo âu (thường có xu hướng muốn thu mình hoặc trốn tránh).", isCorrect: false },
                    { text: "Sự hụt hẫng, thất vọng.", rationale: "Bạn có một sự tinh tế khi nhìn ra được sự thất vọng ẩn sâu bên trong một lời phê bình. Nhưng ở ngay khoảnh khắc bùng phát với mặt nóng và tim đập nhanh, đó thường là biểu hiện bề mặt của một sự tức giận đang dâng cao.", isCorrect: false },
                    { text: "Sự xấu hổ.", rationale: "Rất dễ hiểu khi bạn chọn đáp án này vì bị phê bình trước đám đông thường gợi lên sự xấu hổ. Tuy vậy, cảm giác 'muốn phản bác ngay lập tức' cùng nhịp tim mạnh cho thấy cơ thể đang huy động năng lượng để 'chiến đấu' (tức giận) thay vì 'rụt lại' (xấu hổ).", isCorrect: false }
                ]
            },
            {
                question: "Bạn đang tranh luận khá gay gắt với một đối tác. Bạn nhớ đến kỹ năng STOP và quyết định thực hành bước đầu tiên: S (Stop - Dừng lại). Hành động nào dưới đây thể hiện tốt nhất bước này?",
                options: [
                    { text: "Tạm ngưng việc nói lại, giữ im lặng một nhịp và không đưa ra thêm bất kỳ quyết định hay lời bình luận nào ngay khoảnh khắc đó.", rationale: "Hoàn toàn chính xác. Dừng lại đơn giản là tạo ra một khoảng lùi nhỏ, một không gian đệm để ngăn cơ thể và tâm trí phản ứng theo thói quen.", isCorrect: true },
                    { text: "Xin lỗi đối tác, đứng dậy rời khỏi phòng ngay lập tức để tìm không gian yên tĩnh.", rationale: "Bảo vệ bản thân khỏi nguồn cơn căng thẳng là một phản ứng tự vệ rất tốt và đáng trân trọng. Dù vậy, bước 'Dừng lại' trong STOP thường được thực hành tinh tế ngay tại chỗ bằng cách ngưng hành động hiện tại một nhịp, thay vì phải rời đi ngay lập tức.", isCorrect: false },
                    { text: "Yêu cầu đối tác ngừng nói ngay để bạn có thời gian suy nghĩ.", rationale: "Cách làm này cho thấy bạn đang rất chủ động muốn tạo ra không gian an toàn cho mình, điều đó rất dũng cảm. Tuy nhiên, 'Dừng lại' trong STOP hướng vào việc dừng chính những phản ứng bên trong mình trước, thay vì cố gắng thay đổi người đối diện.", isCorrect: false },
                    { text: "Cố gắng gạt bỏ mọi suy nghĩ về công việc ra khỏi đầu để đầu óc trống rỗng.", rationale: "Mong muốn có một tâm trí bình yên lúc căng thẳng là nhu cầu rất chính đáng của con người. Tuy nhiên, việc cố gắng 'xóa sạch' suy nghĩ thường tạo thêm áp lực; chữ S chỉ đơn giản là tạm ngưng hành động bên ngoài.", isCorrect: false }
                ]
            },
            {
                question: "Tiếp tục với kỹ năng STOP khi đối diện deadline gấp rút. Sau khi Dừng lại (S) và Hít thở (T - Take a breath), bạn bước vào giai đoạn O (Observe - Quan sát). Lựa chọn nào sau đây phản ánh đúng tinh thần của sự quan sát này?",
                options: [
                    { text: "Tập trung đánh giá xem các đồng nghiệp khác có đang lười biếng và làm chậm tiến độ của mình hay không.", rationale: "Khi áp lực thời gian đè nặng, việc tìm kiếm nguyên nhân từ môi trường xung quanh là phản xạ tự nhiên của não bộ để giải quyết vấn đề. Nhưng bước O tuyệt vời nhất khi ta thu sự chú ý về hiện tại thay vì hướng ra ngoài.", isCorrect: false },
                    { text: "Nhanh chóng liệt kê trong đầu những lỗi lầm mình đã mắc phải khiến công việc bị dồn ứ.", rationale: "Khả năng tự nhìn nhận lỗi sai cho thấy bạn là một người rất có trách nhiệm với công việc. Tuy nhiên, trong bước Quan sát, ta chỉ cần ghi nhận sự việc mà không đi kèm với việc tự phán xét hay đổ lỗi cho bản thân.", isCorrect: false },
                    { text: "Nhận diện xem cơ thể mình đang gồng cứng ở đâu, tâm trí đang lo lắng điều gì, ghi nhận chúng như nó đang là mà không phán xét.", rationale: "Rất tinh tế. Bạn đã nắm bắt được cốt lõi của sự quan sát. Việc nhận diện rõ ràng trạng thái thân - tâm mà không dán nhãn 'tốt' hay 'xấu' giúp tháo gỡ sự kháng cự bên trong.", isCorrect: true },
                    { text: "Nhìn đồng hồ liên tục để ước lượng xem mình còn lại bao nhiêu thời gian.", rationale: "Sự bận tâm về thời gian là một biểu hiện rất dễ hiểu của sự lo âu khi có deadline. Dù vậy, Quan sát (Observe) trong STOP khuyến khích ta hướng sự chú ý một cách toàn diện vào bên trong thân thể và tâm trí hiện tại hơn là chỉ tập trung vào ngoại cảnh.", isCorrect: false }
                ]
            },
            {
                question: "SBNRR là một chuỗi thực hành sâu sắc hơn để đối diện với những tình huống khó khăn, chẳng hạn như nhận một email phàn nàn đầy định kiến. Bạn có nhớ SBNRR là viết tắt của những từ khóa nào theo thứ tự không?",
                options: [
                    { text: "Dừng lại (Stop), Hít thở (Breathe), Ghi nhận (Notice), Suy ngẫm (Reflect), Phản hồi (Respond).", rationale: "Chính xác! Chuỗi này tạo ra một vòng cung hoàn hảo từ việc giảm tốc độ, kết nối với cơ thể, quan sát tâm trí, mở rộng góc nhìn và cuối cùng là hành động một cách có ý thức.", isCorrect: true },
                    { text: "Dừng lại (Stop), Hít thở (Breathe), Ghi chú (Note), Đọc lại (Read), Phản hồi (Respond).", rationale: "Đây cũng là một quy trình xử lý công việc rất logic và chuyên nghiệp. Tuy nhiên, trong khung thực hành chánh niệm SBNRR, chữ N và R đầu tiên thiên về sự kết nối nội tâm nhiều hơn là các thao tác lý trí.", isCorrect: false },
                    { text: "Dừng lại (Stop), Cân bằng (Balance), Nuôi dưỡng (Nurture), Nghỉ ngơi (Rest), Phục hồi (Recover).", rationale: "Những từ khóa bạn chọn mang năng lượng chữa lành rất tuyệt vời, rất cần thiết sau những giờ làm việc căng thẳng. Khung SBNRR thực tế lại tập trung vào cách xử lý trực tiếp một kích thích cảm xúc ngay tại thời điểm nó xảy ra.", isCorrect: false },
                    { text: "Bắt đầu (Start), Hít thở (Breathe), Ghi nhận (Notice), Ghi nhớ (Remember), Lặp lại (Repeat).", rationale: "Cách diễn đạt này giống như một quy trình xây dựng thói quen tích cực mới, một góc nhìn rất thú vị. Nhưng SBNRR bắt đầu bằng sự 'Dừng lại' để ngắt một thói quen phản ứng cũ.", isCorrect: false }
                ]
            },
            {
                question: "Trong quy trình SBNRR, bước 'Suy ngẫm' (R - Reflect) đóng vai trò gì khi bạn phát hiện một đồng nghiệp đang hiểu lầm ý tốt của mình trong dự án chung?",
                options: [
                    { text: "Cho phép bản thân chìm đắm vào cảm giác tủi thân để trọn vẹn với sự tổn thương của mình.", rationale: "Thừa nhận sự tổn thương và cho phép mình buồn là một hành động rất dũng cảm và yêu thương bản thân. Bước Suy ngẫm sau đó sẽ giúp bạn lấy lại sự vững chãi để không bị cuốn trôi hoàn toàn vào cảm xúc đó.", isCorrect: false },
                    { text: "Suy nghĩ để tìm ra những lý lẽ sắc bén nhất nhằm chứng minh rằng đồng nghiệp đó đã sai.", rationale: "Mong muốn minh oan và bảo vệ lẽ phải là nhu cầu hoàn toàn tự nhiên để bảo vệ giá trị của bản thân. Dù vậy, bước Reflect trong SBNRR nhằm hướng tới sự thấu cảm và bức tranh lớn hơn là việc thắng - thua trong tranh luận.", isCorrect: false },
                    { text: "Tự hỏi xem có điều gì ẩn sau phản ứng của đồng nghiệp không, điều gì thực sự quan trọng với dự án lúc này, từ đó chọn góc nhìn rộng lớn hơn.", rationale: "Tuyệt vời. Đây chính là không gian của sự minh triết. Khi bạn bước lùi lại và suy ngẫm rộng hơn, bạn chuyển hóa từ một nạn nhân của hoàn cảnh thành người chủ động kiến tạo giải pháp.", isCorrect: true },
                    { text: "Lục tìm lại ký ức xem người đồng nghiệp này có từng hiểu lầm ai khác trong quá khứ không để củng cố lập luận của mình.", rationale: "Não bộ chúng ta rất giỏi trong việc tìm kiếm dữ liệu để tự bảo vệ mình, đó là bản năng sinh tồn. Tuy nhiên, bước Suy ngẫm trong SBNRR khuyến khích ta ở lại với thực tại của vấn đề hiện tại thay vì đào xới quá khứ.", isCorrect: false }
                ]
            },
            {
                question: "Bạn vừa nhận được email thông báo không được chọn cho đợt thăng chức lần này. Bạn cảm thấy lồng ngực nặng trĩu, năng lượng cạn kiệt, không muốn giao tiếp và trong đầu lặp đi lặp lại suy nghĩ 'Mình chưa đủ giỏi'. Việc xác định cảm xúc lúc này là gì?",
                options: [
                    { text: "Sự kiệt sức nghề nghiệp (Burnout).", rationale: "Rất có thể sự kiện này là một giọt nước tràn ly nếu bạn đã làm việc quá sức trong thời gian dài, suy luận này của bạn rất có chiều sâu. Nhưng ở khoảnh khắc cụ thể vừa nhận tin buồn, trạng thái này phản ánh một cảm xúc tức thời rõ rệt hơn.", isCorrect: false },
                    { text: "Sự buồn bã, hụt hẫng và tổn thương.", rationale: "Bạn đã dũng cảm gọi tên đúng sự mong manh này. Việc đối diện với sự từ chối mang lại nỗi buồn sâu sắc. Ghi nhận sự buồn bã là bước đầu tiên để ôm ấp và chữa lành nó.", isCorrect: true },
                    { text: "Sự ghen tị với người được thăng chức.", rationale: "Sự ghen tị là một cảm xúc rất con người và hoàn toàn có thể xuất hiện sau đó. Nhưng những biểu hiện như nặng ngực, thu mình lại và tự trách bản thân đang tập trung vào nỗi đau của chính bạn nhiều hơn là hướng sự chú ý sang người khác.", isCorrect: false },
                    { text: "Sự tức giận ngầm đối với công ty.", rationale: "Khi bị từ chối, sự ấm ức và tức giận công ty là phản ứng hoàn toàn bình thường để bảo vệ lòng tự trọng. Dù vậy, những biểu hiện giảm năng lượng và tự trách ('mình chưa đủ giỏi') thường nghiêng về phía sự buồn bã và tổn thương nhiều hơn.", isCorrect: false }
                ]
            },
            {
                question: "Một người đồng nghiệp liên tục ngắt lời khi bạn đang trình bày ý tưởng tâm huyết. Bạn nhận diện được mình đang rất bực bội. Áp dụng kỹ năng STOP hoặc SBNRR, hành động nào sau đây thể hiện tốt nhất bước cuối cùng: Phản hồi/Tiếp tục (Respond/Proceed)?",
                options: [
                    { text: "Im lặng từ đó đến cuối buổi họp vì cảm thấy có nói ra cũng không được tôn trọng.", rationale: "Việc lựa chọn im lặng cho thấy bạn đang bảo vệ năng lượng của bản thân khỏi một môi trường kém thân thiện, đó là một cơ chế phòng vệ có thể hiểu được. Tuy nhiên, một sự 'Phản hồi' có chánh niệm sẽ giúp bạn vừa bảo vệ mình, vừa tiếp tục đóng góp giá trị mà không cần phải thu mình lại.", isCorrect: false },
                    { text: "Đợi người đó dừng một nhịp, hít một hơi sâu và nói với giọng điềm tĩnh: 'Tôi hiểu ý bạn, xin phép cho tôi được chia sẻ nốt ý tưởng của mình nhé'.", rationale: "Thật xuất sắc! Đây là minh chứng rõ ràng cho sức mạnh của sự điềm tĩnh. Bạn không hề bỏ qua cảm xúc của mình, cũng không tấn công người khác, bạn chỉ đơn giản là thiết lập ranh giới một cách đầy tôn trọng.", isCorrect: true },
                    { text: "Ngay lập tức ngắt lời lại người đó với âm lượng to hơn để giành lại quyền kiểm soát cuộc trò chuyện.", rationale: "Hành động này bộc lộ sự tự tin và mong muốn khẳng định vị thế của bạn, điều này đôi khi rất cần thiết. Tuy vậy, theo hướng tiếp cận của SBNRR, việc đấu tranh bằng sức mạnh âm lượng thường là 'phản xạ' (React) của sự bực tức hơn là một 'phản hồi' (Respond) sáng suốt.", isCorrect: false },
                    { text: "Ngừng cuộc họp và yêu cầu người quản lý phải chấn chỉnh lại thái độ của đồng nghiệp kia ngay lập tức.", rationale: "Bạn có ý thức rất rõ ràng về sự công bằng và tính kỷ luật trong môi trường làm việc, điều đó rất đáng quý. Nhưng việc đẩy trách nhiệm giải quyết cảm xúc hiện tại cho người thứ ba đôi khi làm mất đi cơ hội thực hành năng lực tự chủ của chính bạn ngay lúc đó.", isCorrect: false }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let isAnswered = false;
        let userAnswers = new Array(quizData.length).fill(null); 

        const questionTextEl = document.getElementById('question-text');
        const optionsContainerEl = document.getElementById('options-container');
        const feedbackSectionEl = document.getElementById('feedback-section');
        const feedbackTitleEl = document.getElementById('feedback-title');
        const feedbackRationaleEl = document.getElementById('feedback-rationale');
        const questionCounterEl = document.getElementById('question-counter');
        const progressBarEl = document.getElementById('progress-bar'); 
        const questionSectionEl = document.getElementById('question-section');
        const resultSectionEl = document.getElementById('result-section');
        const prevButtonEl = document.getElementById('prev-button');
        const nextButtonNavEl = document.getElementById('next-button-nav');

        function initQuiz() {
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            questionSectionEl.classList.remove('hidden');
            resultSectionEl.classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            // Tự động cuộn lên đầu khung trắc nghiệm khi tải câu hỏi mới
            const quizContainer = document.getElementById('quiz-container');
            if (quizContainer) {
                quizContainer.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }

            // Check if current question was already answered
            isAnswered = userAnswers[currentQuestionIndex] !== null;
            const currentQ = quizData[currentQuestionIndex];
            
            // Update Progress
            questionCounterEl.textContent = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;
            const progressPercentage = ((currentQuestionIndex) / quizData.length) * 100;
            progressBarEl.style.width = `${progressPercentage}%`;

            // Set Question Text
            questionTextEl.textContent = currentQ.question;
            
            // Clear previous options and feedback
            optionsContainerEl.innerHTML = '';
            feedbackSectionEl.classList.add('hidden');

            // Render Options
            currentQ.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-4 rounded-xl border border-gray-200 hover:border-teal-500 hover:bg-teal-50 transition-all duration-200 focus:outline-none flex items-start group';
                
                // Add letter (A, B, C, D)
                const letter = String.fromCharCode(65 + index);
                
                button.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 font-semibold mr-4 group-hover:bg-teal-100 group-hover:text-teal-700 transition-colors">${letter}</span>
                    <span class="text-gray-700 font-medium pt-1">${option.text}</span>
                `;
                
                button.onclick = () => selectOption(index, button, option);
                optionsContainerEl.appendChild(button);
            });

            // Update navigation buttons state
            prevButtonEl.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === quizData.length - 1) {
                nextButtonNavEl.textContent = 'Hoàn thành';
            } else {
                nextButtonNavEl.textContent = 'Câu tiếp';
            }

            // Restore previous answer state if it exists
            if (isAnswered) {
                const previousAnswerIndex = userAnswers[currentQuestionIndex];
                const optionData = currentQ.options[previousAnswerIndex];
                
                // Temporarily unset isAnswered so selectOption can style the buttons
                isAnswered = false; 
                selectOption(previousAnswerIndex, optionsContainerEl.children[previousAnswerIndex], optionData);
            }
            
            // Small animation
            questionSectionEl.style.opacity = 0;
            setTimeout(() => { questionSectionEl.style.opacity = 1; }, 50);
        }

        function selectOption(selectedIndex, buttonEl, optionData) {
            if (isAnswered) return; // Prevent multiple selections for new answers
            isAnswered = true;
            userAnswers[currentQuestionIndex] = selectedIndex;

            const buttons = optionsContainerEl.querySelectorAll('button');
            
            // Disable all buttons and style them based on correctness
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                btn.classList.remove('hover:border-teal-500', 'hover:bg-teal-50', 'cursor-pointer');
                
                const optionInfo = quizData[currentQuestionIndex].options[idx];
                const letterSpan = btn.querySelector('span:first-child');
                
                if (idx === selectedIndex) {
                    if (optionInfo.isCorrect) {
                        btn.classList.add('bg-green-50', 'border-green-500', 'ring-2', 'ring-green-200');
                        letterSpan.classList.add('bg-green-500', 'text-white');
                        letterSpan.classList.remove('bg-gray-100', 'text-gray-600');
                    } else {
                        btn.classList.add('bg-blue-50', 'border-blue-400'); // Changed from Red to Blue for supportive feedback
                        letterSpan.classList.add('bg-blue-500', 'text-white');
                        letterSpan.classList.remove('bg-gray-100', 'text-gray-600');
                    }
                } else if (optionInfo.isCorrect) {
                    // Highlight the correct answer even if not selected
                    btn.classList.add('border-green-300', 'opacity-70');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            showFeedback(optionData);
        }

        function showFeedback(optionData) {
            feedbackSectionEl.classList.remove('hidden');
            
            if (optionData.isCorrect) {
                feedbackSectionEl.className = 'mt-8 p-6 rounded-xl border-l-4 border-green-500 bg-green-50 animate-fade-in-up';
                feedbackTitleEl.className = 'text-lg font-bold text-green-800 mb-2 flex items-center';
                feedbackTitleEl.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Tuyệt vời!`;
            } else {
                 // Supportive feedback style for incorrect answers
                feedbackSectionEl.className = 'mt-8 p-6 rounded-xl border-l-4 border-blue-400 bg-blue-50 animate-fade-in-up';
                feedbackTitleEl.className = 'text-lg font-bold text-blue-800 mb-2 flex items-center';
                feedbackTitleEl.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Góc nhìn thú vị`;
            }
            
            feedbackRationaleEl.textContent = optionData.rationale;
            
            // Scroll to the bottom of the container to show navigation buttons
            setTimeout(() => {
                const quizContainer = document.getElementById('quiz-container');
                quizContainer.scrollTo({
                    top: quizContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            questionSectionEl.classList.add('hidden');
            resultSectionEl.classList.remove('hidden');
            progressBarEl.style.width = `100%`;
        }

        function restartQuiz() {
            initQuiz();
        }

        // Add custom animation styles dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in-up {
                animation: fadeInUp 0.4s ease-out forwards;
            }
        `;
        document.head.appendChild(style);

        // Start Quiz on load
        window.onload = initQuiz;

    </script>
</body>
</html>
