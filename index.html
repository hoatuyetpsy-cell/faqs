<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Cảm xúc Công sở</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Thư viện tạo mã QR ổn định hơn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 1); border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .answer-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #e2e8f0; }
        .answer-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #eff6ff; transform: translateY(-1px); }
        .answer-btn:active { transform: scale(0.98); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md">
        
        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="glass-card p-8 text-center animate-slide">
            <div class="mb-6 flex justify-center">
                <div class="p-5 bg-indigo-100 rounded-3xl text-indigo-600 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-3">Làm Chủ Cảm Xúc</h1>
            <p class="text-slate-500 mb-8 leading-relaxed">Bộ câu hỏi giúp bạn giữ "đầu lạnh" trong các tình huống oái oăm nơi công sở.</p>
            
            <button onclick="startQuiz()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all mb-4">
                Bắt đầu Trắc nghiệm
            </button>
            
            <button onclick="showQRCode()" class="w-full py-3 text-slate-500 font-medium rounded-2xl border-2 border-slate-100 hover:bg-slate-50 flex items-center justify-center gap-2 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm2 2V5h1v1H5zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm2 2v-1h1v1H5zM13 3a1 1 0 00-1 1v3a1 1 0 001 1h3a1 1 0 001-1V4a1 1 0 00-1-1h-3zm1 2h1v1h-1V5z" clip-rule="evenodd" />
                    <path d="M11 4a1 1 0 10-2 0v1a1 1 0 002 0V4zM10 7a1 1 0 011 1v1h2a1 1 0 110 2h-3a1 1 0 01-1-1V8a1 1 0 011-1zM16 9a1 1 0 100-2h-1a1 1 0 100 2h1zM9 13a1 1 0 011-1h1a1 1 0 110 2H10a1 1 0 01-1-1zM7 11a1 1 0 100-2H6a1 1 0 100 2h1zM11 15a1 1 0 100-2h-1a1 1 0 100 2h1zM16 13a1 1 0 11-2 0v-1a1 1 0 112 0v1zM13 17a1 1 0 100-2h-1a1 1 0 100 2h1zM7 17a1 1 0 100-2H6a1 1 0 100 2h1zM15 17a1 1 0 100-2h-1a1 1 0 100 2h1z" />
                </svg>
                Mã QR cho mọi người
            </button>
        </div>

        <!-- Màn hình Câu hỏi -->
        <div id="quiz-screen" class="hidden glass-card p-6 animate-slide">
            <div class="flex justify-between items-center mb-6">
                <span id="progress-text" class="text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase">Câu 1 / 10</span>
                <div class="w-32 bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-tight">...</h2>
            
            <div id="options-container" class="space-y-3">
                <!-- Đáp án chèn ở đây -->
            </div>

            <!-- Panel Phản hồi khi trả lời xong -->
            <div id="feedback-panel" class="hidden mt-8 p-5 rounded-2xl border-l-8 transform transition-all">
                <div class="flex items-start gap-3">
                    <div id="feedback-icon" class="mt-1"></div>
                    <div>
                        <p id="feedback-message" class="font-bold text-lg mb-1"></p>
                        <p id="feedback-hint" class="text-sm text-slate-600 leading-relaxed"></p>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="mt-6 w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 shadow-lg">Tiếp tục</button>
            </div>
        </div>

        <!-- Màn hình Kết quả -->
        <div id="result-screen" class="hidden glass-card p-10 text-center animate-slide">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Kết quả của bạn</h2>
            <div class="text-6xl font-black text-indigo-600 my-6" id="final-score">0/10</div>
            <p id="result-comment" class="text-slate-500 mb-10 text-lg leading-relaxed"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-100 text-slate-700 font-bold rounded-2xl hover:bg-slate-200 transition-all">Thử lại</button>
        </div>

        <!-- Modal QR Code -->
        <div id="qr-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white p-8 rounded-[2rem] max-w-sm w-full text-center shadow-2xl relative">
                <button onclick="hideQRCode()" class="absolute top-4 right-4 text-slate-300 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" /></svg>
                </button>

                <h3 class="font-bold text-xl mb-2">Chia sẻ cho đồng nghiệp</h3>
                <p class="text-xs text-amber-600 bg-amber-50 p-2 rounded-lg mb-6 border border-amber-100">
                    Lưu ý: Link "blob" hoặc "sandbox" chỉ mình bạn xem được. Hãy dán link web thật vào ô dưới.
                </p>
                
                <!-- Ô nhập URL để test mã QR -->
                <div class="mb-4">
                    <input type="text" id="custom-url" placeholder="Dán link web của bạn vào đây..." class="w-full px-4 py-2 border rounded-xl text-xs focus:ring-2 focus:ring-indigo-400 outline-none">
                    <button onclick="updateQR()" class="mt-2 text-[10px] text-indigo-600 font-bold uppercase tracking-wider">Cập nhật mã QR</button>
                </div>

                <div id="qrcode" class="flex justify-center mb-6 bg-slate-50 p-4 rounded-2xl min-h-[128px] items-center">
                    <span class="text-xs text-slate-400">Đang tạo...</span>
                </div>

                <button id="copy-btn" onclick="copyToClipboard()" class="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl text-sm font-bold hover:bg-indigo-100 transition-all">
                    Sao chép đường dẫn
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Bạn vừa nhận được một email từ đồng nghiệp với lời lẽ khá 'gắt'. Phản ứng đầu tiên giúp bạn không hối hận là gì?",
                options: [
                    "Viết ngay một email đáp trả còn 'gắt' hơn để dằn mặt.",
                    "Đóng email lại, đi pha nước hoặc hít thở sâu rồi mới đọc kỹ lại.",
                    "Chụp màn hình gửi ngay vào nhóm chat riêng để nói xấu.",
                    "Trả lời ngay lập tức bằng lý lẽ đanh thép để bảo vệ bản thân."
                ],
                correct: 1,
                hint: "Sự nóng nảy tức thời thường dẫn đến những lời lẽ khó rút lại. Một khoảng lặng ngắn giúp lý trí quay trở lại thay vì hành động theo bản năng 'chiến đấu'."
            },
            {
                q: "Trong cuộc họp, sếp phê bình trực tiếp lỗi sai của bạn. Bạn nên tự nhủ điều gì để bình tĩnh?",
                options: [
                    "Sếp đang trù dập mình, chắc muốn mình nghỉ việc đây.",
                    "Mọi người chắc đang cười nhạo mình lắm, nhục nhã quá.",
                    "Đây là lời góp ý cho công việc, không phải tấn công cá nhân.",
                    "Lần sau mình sẽ tìm cách đổ lỗi này cho người khác."
                ],
                correct: 2,
                hint: "Đừng cá nhân hóa mọi lời chê. Tách biệt giữa 'kết quả công việc' và 'giá trị bản thân' giúp bạn đón nhận góp ý nhẹ nhàng hơn."
            },
            {
                q: "Deadline sát nút nhưng máy tính hỏng và đồng nghiệp làm phiền. Bạn nên làm gì?",
                options: [
                    "Quát vào mặt đồng nghiệp để họ im lặng.",
                    "Cố làm tiếp trong bực bội.",
                    "Đứng dậy đi rửa mặt, liệt kê 3 việc quan trọng nhất cần làm ngay.",
                    "Buông xuôi, tắt máy đi về vì quá áp lực."
                ],
                correct: 2,
                hint: "Khi não bộ quá tải, nó cần được 'reset'. Việc liệt kê giúp bạn lấy lại cảm giác kiểm soát và thoát khỏi trạng thái hoảng loạn."
            },
            {
                q: "Đồng nghiệp thân thiết đang buồn và uể oải. Cách hỏi thăm nào khéo léo nhất?",
                options: [
                    "Sao mặt mày như đưa đám thế? Có chuyện gì kể nghe!",
                    "Tớ thấy hôm nay cậu hơi mệt, nếu cần người nghe thì bảo tớ nhé.",
                    "Làm việc đi, buồn phiền thì để hết giờ rồi tính.",
                    "Đi kể với người khác là bạn đó đang có chuyện buồn."
                ],
                correct: 1,
                hint: "Sự thấu cảm cần sự tế nhị. Cho họ biết bạn sẵn sàng lắng nghe nhưng không ép buộc họ phải chia sẻ ngay lập tức."
            },
            {
                q: "Trước khi bước vào một cuộc đối thoại khó khăn, bạn nên làm gì?",
                options: [
                    "Để đến lúc đó xem cảm xúc thế nào rồi nói đại.",
                    "Tập dượt trước các tình huống xấu nhất và cách trả lời bình tĩnh.",
                    "Uống một chút bia/rượu để lấy can đảm.",
                    "Nhờ người khác nói hộ để không phải đối mặt."
                ],
                correct: 1,
                hint: "Chuẩn bị tâm lý giúp bạn không bị bất ngờ trước các phản ứng tiêu cực. Nó giúp bạn giữ được mục tiêu của cuộc trò chuyện."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let isAnswered = false;
        let qrGenerator = null;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            isAnswered = false;
            const qData = questions[currentQuestion];
            document.getElementById('progress-text').innerText = `Câu ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "answer-btn w-full p-4 text-left rounded-2xl font-medium text-slate-700 bg-white animate-slide";
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback-panel').classList.add('hidden');
        }

        function checkAnswer(index, btn) {
            if (isAnswered) return;
            isAnswered = true;

            const qData = questions[currentQuestion];
            const feedbackPanel = document.getElementById('feedback-panel');
            const feedbackMsg = document.getElementById('feedback-message');
            const feedbackHint = document.getElementById('feedback-hint');
            const feedbackIcon = document.getElementById('feedback-icon');
            
            feedbackPanel.classList.remove('hidden');
            
            if (index === qData.correct) {
                score++;
                btn.className = "answer-btn w-full p-4 text-left border-2 border-green-500 bg-green-50 rounded-2xl font-bold text-green-700";
                feedbackPanel.classList.add('border-green-500', 'bg-green-50');
                feedbackPanel.classList.remove('border-amber-400', 'bg-amber-50');
                feedbackMsg.innerText = "Chính xác! 👏";
                feedbackIcon.innerHTML = '✅';
                feedbackHint.innerText = qData.hint;
            } else {
                btn.className = "answer-btn w-full p-4 text-left border-2 border-red-400 bg-red-50 rounded-2xl font-bold text-red-700";
                feedbackPanel.classList.add('border-amber-400', 'bg-amber-50');
                feedbackPanel.classList.remove('border-green-500', 'bg-green-50');
                feedbackMsg.innerText = "Chưa đúng lắm... 🤔";
                feedbackIcon.innerHTML = '💡';
                feedbackHint.innerHTML = `<span class="font-bold">Gợi ý:</span> ${qData.hint}`;
            }

            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let comment = "";
            if (score === questions.length) comment = "Tuyệt vời! Bạn là bậc thầy kiềm chế cảm xúc. Đồng nghiệp chắc chắn rất nể trọng bạn.";
            else if (score >= 3) comment = "Bạn có EQ khá tốt. Chỉ cần rèn luyện thêm một chút ở các tình huống áp lực cao là hoàn hảo.";
            else comment = "Không sao cả, ai cũng có lúc nóng nảy. Hãy coi đây là dịp để nhìn lại và thay đổi cách phản ứng nhé!";
            
            document.getElementById('result-comment').innerText = comment;
        }

        function showQRCode() {
            const modal = document.getElementById('qr-modal');
            const qrContainer = document.getElementById('qrcode');
            const urlInput = document.getElementById('custom-url');
            
            qrContainer.innerHTML = '';
            modal.classList.remove('hidden');
            
            // Lấy URL thực tế
            let currentUrl = window.location.href;
            urlInput.value = currentUrl;
            
            createQR(currentUrl);
        }

        function updateQR() {
            const url = document.getElementById('custom-url').value;
            if (url) {
                document.getElementById('qrcode').innerHTML = '';
                createQR(url);
            }
        }

        function createQR(url) {
            try {
                qrGenerator = new QRCode(document.getElementById('qrcode'), {
                    text: url,
                    width: 160,
                    height: 160,
                    colorDark : "#1e1b4b",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch (e) {
                document.getElementById('qrcode').innerText = "Lỗi tạo mã QR. Vui lòng kiểm tra link.";
            }
        }

        function copyToClipboard() {
            const url = document.getElementById('custom-url').value;
            const tempInput = document.createElement('input');
            document.body.appendChild(tempInput);
            tempInput.value = url;
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            const btn = document.getElementById('copy-btn');
            btn.innerText = "Đã sao chép vào bộ nhớ tạm!";
            btn.classList.replace('text-indigo-600', 'text-green-600');
            setTimeout(() => {
                btn.innerText = "Sao chép đường dẫn";
                btn.classList.replace('text-green-600', 'text-indigo-600');
            }, 2000);
        }

        function hideQRCode() {
            document.getElementById('qr-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
