<!DOCTYPE html>
<html lang="vi">
<head>

</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-8 flex justify-center">
        <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-full max-h-[800px]">
            
            <!-- Quiz Header -->
            <div class="bg-teal-50 p-6 sm:p-8 border-b border-teal-100 flex justify-between items-start gap-4">
                <div>
                    <h2 class="text-xl sm:text-2xl font-bold text-teal-800 mb-2">Kỹ Năng Làm Chủ Cảm Xúc</h2>
                    <p class="text-teal-600">Thực hành thấu hiểu nội tâm với kỹ năng STOP và SBNRR.</p>
                </div>
                <img src="https://hoatuyetpsy-cell.github.io/faqs/avatar-sm.png" alt="Giáo viên" class="w-12 h-12 sm:w-16 sm:h-16 rounded-full border-2 border-teal-200 shadow-sm object-cover flex-shrink-0">
            </div>

            <!-- Quiz Content Container -->
            <div id="quiz-container" class="flex-1 overflow-y-auto p-6 sm:p-8 relative">
                <!-- Question Section -->
                <div id="question-section" class="transition-opacity duration-300">
                    <div class="flex justify-between items-center mb-6">
                        <span id="question-counter" class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Câu 1 / 7</span>
                        <!-- Progress Bar -->
                        <div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-teal-500 transition-all duration-300" style="width: 14%;"></div>
                        </div>
                    </div>

                    <h3 id="question-text" class="text-xl font-medium text-gray-800 mb-6 leading-relaxed">
                        <!-- Question text will be injected here -->
                    </h3>

                    <!-- Options -->
                    <div id="options-container" class="space-y-3">
                        <!-- Options will be injected here -->
                    </div>

                    <!-- Feedback Section (Hidden initially) -->
                    <div id="feedback-section" class="hidden mt-8 p-6 rounded-xl border-l-4 transition-all duration-300">
                        <h4 id="feedback-title" class="text-lg font-bold mb-2 flex items-center">
                            <!-- Feedback icon and title will be injected here -->
                        </h4>
                        <p id="feedback-rationale" class="text-gray-700 leading-relaxed mb-4">
                            <!-- Rationale text will be injected here -->
                        </p>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="flex justify-between items-center mt-8 pb-4" id="navigation-section">
                        <button id="prev-button" onclick="prevQuestion()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition-colors focus:ring-4 focus:ring-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                            Câu trước
                        </button>
                        <button id="next-button-nav" onclick="nextQuestion()" class="px-6 py-2 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-lg transition-colors focus:ring-4 focus:ring-gray-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Câu tiếp
                        </button>
                    </div>
                </div>

                <!-- Feedback Section (Hidden initially) -->
                <div id="feedback-section" class="hidden mt-8 p-6 rounded-xl border-l-4 transition-all duration-300">
                    <h4 id="feedback-title" class="text-lg font-bold mb-2 flex items-center">
                        <!-- Feedback icon and title will be injected here -->
                    </h4>
                    <p id="feedback-rationale" class="text-gray-700 leading-relaxed mb-4">
                        <!-- Rationale text will be injected here -->
                    </p>
                </div>
                
                <!-- Final Result Section (Hidden initially) -->
                <div id="result-section" class="hidden text-center py-12">
                     <div class="inline-flex items-center justify-center w-20 h-20 bg-teal-100 text-teal-600 rounded-full mb-6">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="text-3xl font-bold text-gray-800 mb-4">Hoàn thành xuất sắc!</h3>
                    <p class="text-lg text-gray-600 mb-8 max-w-md mx-auto">Bạn đã dành thời gian để thấu hiểu bản thân. Nhớ rằng, điều hòa cảm xúc là một hành trình luyện tập mỗi ngày.</p>
                    <button onclick="restartQuiz()" class="px-8 py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-colors shadow-lg hover:shadow-xl">
                        Thực hành lại
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        const quizData = [
            {
                question: "Bạn nhận được một email từ sếp CC toàn phòng, phê bình một lỗi mà thực chất là do đồng nghiệp khác gây ra. Bạn thấy ngực tức lại, hàm răng cắn chặt và muốn gõ ngay một email phản pháo. Bước đầu tiên tốt nhất để làm chủ tình huống này là gì?",
                options: [
                    { text: "Dừng lại một nhịp, tự nhủ: 'Mình đang cảm thấy rất oan ức và bực tức lúc này.'", rationale: "Rất chính xác! Nhận diện và gọi tên đúng cảm xúc đang diễn ra giúp não bộ kích hoạt vùng tư duy logic, làm giảm cường độ của sự bốc đồng và tạo không gian cho phản hồi sáng suốt.", isCorrect: true },
                    { text: "Phân tích ngay lập tức xem ai là người có lỗi để tìm cách giải trình.", rationale: "Phản xạ giải quyết vấn đề và tìm lại công bằng của bạn rất nhạy bén. Tuy nhiên, trước khi giải quyết sự việc, việc gọi tên cảm xúc của chính mình sẽ giúp tâm trí bạn sáng suốt và tránh những lời lẽ gay gắt không đáng có.", isCorrect: false },
                    { text: "Cố gắng đè nén cảm giác bực bội và ép bản thân phải mỉm cười cho qua.", rationale: "Sự bao dung và mong muốn dĩ hòa vi quý của bạn rất đáng quý. Nhưng việc ép buộc bản thân chối bỏ sự oan ức có thể gây dồn nén nội tâm. Nhận diện và gọi tên nó một cách chân thực mới là bước đầu tiên hiệu quả.", isCorrect: false },
                    { text: "Nhắn tin ngay cho người đồng nghiệp kia để làm cho ra nhẽ.", rationale: "Rất hiểu mong muốn bảo vệ danh dự của bạn ngay lập tức. Nhưng trong lúc năng lượng tức giận đang dâng cao, việc ghi nhận cảm xúc của chính mình trước sẽ giúp bạn giao tiếp với đồng nghiệp một cách xây dựng hơn.", isCorrect: false }
                ]
            },
            {
                question: "Trong một cuộc họp căng thẳng, bạn và đối tác bất đồng ý kiến gay gắt. Bạn cảm thấy giọng mình đang to dần lên và nhịp tim đập rất nhanh. Áp dụng kỹ thuật 'hoãn binh và hạ nhiệt', hành động nào sau đây là phù hợp nhất?",
                options: [
                    { text: "Xin phép tạm nghỉ giải lao 5 phút để đi uống nước hoặc rửa mặt trước khi tiếp tục.", rationale: "Sự lựa chọn tuyệt vời! Một khoảng 'hoãn binh' vật lý ngắn giúp cắt đứt mạch cảm xúc leo thang, cho phép cơ thể hạ nhiệt và tâm trí lấy lại sự bình tĩnh cần thiết.", isCorrect: true },
                    { text: "Khoanh tay trước ngực, nhìn chằm chằm vào đối tác để thể hiện sự kiên định.", rationale: "Ngôn ngữ cơ thể này cho thấy bạn là người có cá tính mạnh mẽ và bảo vệ lập trường tốt. Dù vậy, nó có thể làm không khí thêm căng thẳng. Một nhịp 'hoãn binh' ngắn sẽ giúp cả hai bên tìm được tiếng nói chung dễ dàng hơn.", isCorrect: false },
                    { text: "Lấy điện thoại ra lướt xem tin nhắn để phớt lờ những gì họ đang nói.", rationale: "Chuyển hướng sự chú ý là một cách tự vệ tự nhiên của não bộ để giảm bớt áp lực. Nhưng trong giao tiếp chuyên nghiệp, hành động này dễ bị hiểu lầm. Xin tạm nghỉ vài phút uống nước sẽ là một kỹ thuật hạ nhiệt thanh lịch hơn.", isCorrect: false },
                    { text: "Đập bàn và yêu cầu mọi người phải trật tự lắng nghe ý kiến của mình.", rationale: "Sự quyết đoán và đam mê bảo vệ ý tưởng của bạn rất đáng ghi nhận. Dù vậy, để làm chủ hoàn toàn tình huống, việc áp dụng kỹ thuật 'hoãn binh' sẽ giúp lời nói của bạn sau đó có sức nặng và sự thuyết phục cao hơn là dùng áp lực âm thanh.", isCorrect: false }
                ]
            },
            {
                question: "Bạn đã dồn nhiều tâm huyết đề xuất một dự án mới nhưng cuối cùng ban giám đốc lại chọn phương án của nhóm khác. Kỹ năng 'thay đổi góc nhìn' được thể hiện qua suy nghĩ nào dưới đây?",
                options: [
                    { text: "Chắc chắn là có sự thiên vị ở đây, nỗ lực bao nhiêu cũng vô ích.", rationale: "Cảm giác thất vọng và hoài nghi là rất con người khi nỗ lực không được đền đáp. Tuy nhiên, góc nhìn này có thể làm giảm động lực của chính bạn. Hãy thử mở rộng lăng kính để tìm kiếm những cơ hội học hỏi khác.", isCorrect: false },
                    { text: "Mình thật kém cỏi, lẽ ra mình không nên đưa ra đề xuất ngay từ đầu.", rationale: "Khả năng tự phản tỉnh của bạn là một điểm mạnh, nó cho thấy bạn luôn muốn tốt hơn. Nhưng thay vì tự trách khắt khe, việc nhìn nhận tình huống như một phép thử sự phù hợp sẽ mang lại năng lượng tích cực hơn.", isCorrect: false },
                    { text: "Phương án của mình có điểm hay, nhưng có thể phương án kia phù hợp với nguồn lực công ty hiện tại hơn. Mình có thể học hỏi thêm từ họ.", rationale: "Thật xuất sắc! Đây chính là cốt lõi của việc thay đổi góc nhìn. Bạn không phủ nhận giá trị của bản thân, đồng thời mở rộng tư duy để nhìn thấy bức tranh toàn cảnh và cơ hội phát triển.", isCorrect: true },
                    { text: "Dự án kia rồi cũng sẽ thất bại thôi, cứ chờ xem.", rationale: "Phản ứng bảo vệ cái tôi này có thể giúp bạn xoa dịu nỗi buồn tạm thời, đó là cơ chế phòng vệ tự nhiên. Nhưng một góc nhìn cởi mở, hướng tới sự hợp tác sẽ giúp bạn thăng tiến xa hơn trong sự nghiệp.", isCorrect: false }
                ]
            },
            {
                question: "Trước buổi thuyết trình quan trọng, bạn bị ám ảnh bởi suy nghĩ: 'Nếu mình nói vấp, mọi người sẽ cười chê và đánh giá mình thiếu năng lực'. Bạn có thể áp dụng 'tái cấu trúc nhận thức' để thay đổi suy nghĩ này như thế nào?",
                options: [
                    { text: "Nói vấp là chuyện bình thường ai cũng gặp. Quan trọng là thông điệp mình truyền tải, mọi người ở đây để nghe nội dung chứ không phải để bắt lỗi.", rationale: "Chính xác! Bạn đã tái cấu trúc thành công từ việc tập trung vào 'nỗi sợ bị phán xét' sang việc tập trung vào 'giá trị cốt lõi' của bài thuyết trình. Điều này giúp giảm lo âu đáng kể.", isCorrect: true },
                    { text: "Mình phải hoàn hảo 100%, tuyệt đối không được sai sót bất cứ từ nào.", rationale: "Khát vọng vươn tới sự hoàn hảo cho thấy bạn rất nghiêm túc và có trách nhiệm với công việc. Nhưng áp lực này lại dễ khiến bạn căng thẳng hơn; việc cho phép mình có tính 'người' (có thể sai sót nhẹ) sẽ giúp bạn trình bày tự nhiên hơn.", isCorrect: false },
                    { text: "Kể cả mình có làm tệ thì đến chiều mọi người cũng quên hết thôi, sao phải lo.", rationale: "Góc nhìn này khá thực tế và là một cách hay để giảm bớt sự nghiêm trọng hóa vấn đề. Tuy nhiên, tái cấu trúc nhận thức hiệu quả nhất là khi ta xây dựng niềm tin vào giá trị bản thân mang lại, thay vì sự buông xuôi.", isCorrect: false },
                    { text: "Những người ngồi dưới kia chắc gì đã hiểu vấn đề tốt hơn mình.", rationale: "Sự tự tin vào kiến thức chuyên môn của bạn là một điểm tựa rất vững chắc. Dù vậy, 'tái cấu trúc nhận thức' khuyên chúng ta nên hướng tới sự kết nối và chia sẻ giá trị với người nghe, thay vì tạo ra rào cản tâm lý để tự vệ.", isCorrect: false }
                ]
            },
            {
                question: "Sau một ngày làm việc mệt mỏi với nhiều lời phàn nàn từ khách hàng, bạn mang tâm trạng bực dọc về nhà. Hành động nào sau đây giúp 'ngắt kết nối và xả van cảm xúc' một cách lành mạnh trước khi bước vào cửa?",
                options: [
                    { text: "Dành 10-15 phút nghe bản nhạc yêu thích, đi dạo một vòng hoặc hít thở sâu trên xe để trút bỏ áp lực công việc trước khi tương tác với gia đình.", rationale: "Bạn nắm bắt kỹ thuật rất tốt! Tạo ra một vùng 'không gian đệm' để ngắt kết nối với công việc và xả bớt áp lực giúp bạn mang phiên bản thư thái nhất về với tổ ấm.", isCorrect: true },
                    { text: "Vừa ăn tối vừa liên tục than phiền về những khách hàng khó tính cho người thân nghe.", rationale: "Nhu cầu được chia sẻ để vơi đi nỗi niềm là rất chính đáng và cho thấy bạn tin tưởng gia đình mình. Nhưng để thực sự 'ngắt kết nối', việc xả van bằng các hoạt động thư giãn cá nhân trước sẽ giúp không khí gia đình trọn vẹn hơn.", isCorrect: false },
                    { text: "Đóng chặt cửa phòng, nằm bấm điện thoại đến khuya và không nói chuyện với ai.", rationale: "Tìm kiếm sự tĩnh lặng là cách cơ thể đòi hỏi được nghỉ ngơi sau ngày dài. Tuy nhiên, việc cô lập hoàn toàn có thể khiến cảm xúc bị tồn đọng. Một hình thức 'xả van' chủ động như vận động nhẹ hay hít thở sẽ mang lại sự tái tạo tốt hơn.", isCorrect: false },
                    { text: "Tự nhủ rằng mình phải mạnh mẽ, nuốt cơn giận vào trong và tỏ ra vui vẻ như không có chuyện gì.", rationale: "Sự hy sinh và nỗ lực giữ hòa khí gia đình của bạn thật đáng trân trọng. Nhưng cảm xúc cần được 'xả van' một cách lành mạnh thay vì bị đè nén lại bên trong, bởi sự dồn nén lâu ngày có thể gây ra kiệt sức.", isCorrect: false }
                ]
            },
            {
                question: "Trong kỳ đánh giá nhân sự, người quản lý chỉ ra một điểm yếu mà bạn thấy không đúng thực tế. Sự ấm ức dâng lên. Trình tự nào sau đây thể hiện sự kết hợp tốt nhất giữa 'nhận diện' và 'hạ nhiệt'?",
                options: [
                    { text: "Lập tức đưa ra hàng loạt dẫn chứng để chứng minh người quản lý đã sai.", rationale: "Sự nhạy bén và khả năng bảo vệ thành quả công việc của bạn rất ấn tượng. Tuy nhiên, tranh luận ngay lúc cảm xúc dâng cao có thể thiếu khách quan; một nhịp dừng lại 'hạ nhiệt' sẽ giúp lập luận của bạn sắc bén và thuyết phục hơn.", isCorrect: false },
                    { text: "Nhận thấy lồng ngực thắt lại (nhận diện) -> Hít một hơi sâu, uống một ngụm nước (hạ nhiệt) -> Lắng nghe trọn vẹn trước khi chia sẻ góc nhìn của mình.", rationale: "Rất hoàn hảo! Bạn đã kết nối được cơ thể và tâm trí. Nhận diện sự thay đổi sinh lý, dùng nhịp thở và nước để làm mát hệ thần kinh, tạo tiền đề cho một cuộc đối thoại mang tính xây dựng.", isCorrect: true },
                    { text: "Tự nói với bản thân 'Mình đang rất bực' (nhận diện) -> Bật khóc hoặc lớn tiếng ngay tại chỗ để xả van cảm xúc (hạ nhiệt).", rationale: "Dũng cảm sống thật với cảm xúc của mình là một điều đáng quý. Nhưng trong môi trường công sở, kỹ thuật hạ nhiệt qua hơi thở sẽ giúp bạn giữ vững được phong thái chuyên nghiệp trong khi vẫn làm chủ được nội tâm.", isCorrect: false },
                    { text: "Cố gắng mỉm cười đồng ý (hạ nhiệt) -> Về nhà viết một email dài để phản đối (nhận diện sau).", rationale: "Cách xử lý này cho thấy bạn là người rất cẩn trọng, không muốn tạo xung đột trực tiếp. Tuy nhiên, việc làm chủ tình huống ngay tại thời điểm đó qua sự ghi nhận nội tâm sẽ giúp hai bên thấu hiểu nhau trực tiếp và hiệu quả hơn.", isCorrect: false }
                ]
            },
            {
                question: "Bạn nhắn tin nhờ đồng nghiệp gửi tài liệu gấp nhưng 2 tiếng trôi qua không thấy họ trả lời dù báo 'đã xem'. Thay vì nghĩ 'Người này đang cố tình phớt lờ mình', tư duy 'tái cấu trúc nhận thức' nào dưới đây là phù hợp nhất?",
                options: [
                    { text: "Thật thiếu chuyên nghiệp, mình sẽ báo cáo việc này lên cấp trên để họ giải quyết.", rationale: "Ý thức về kỷ luật và tiến độ công việc của bạn rất cao. Dù vậy, việc thay đổi góc nhìn để tìm hiểu nguyên nhân đằng sau sẽ giúp bạn duy trì các mối quan hệ công sở bền vững trước khi dùng đến các biện pháp cứng rắn.", isCorrect: false },
                    { text: "Chắc do mình từng làm gì mất lòng họ nên giờ họ trả đũa. Mình phải xem lại bản thân.", rationale: "Bạn có thói quen tự quán xét bản thân rất sâu sắc, điều này cho thấy bạn là người có trách nhiệm. Nhưng đôi khi sự chậm trễ chỉ đơn thuần là do ngoại cảnh khách quan, việc tái cấu trúc nhận thức giúp bạn bớt tự gánh lấy áp lực không đáng có.", isCorrect: false },
                    { text: "Họ không gửi thì thôi, mình cũng không thèm làm phần việc đó nữa.", rationale: "Phản ứng buông bỏ này là cách tâm trí giúp bạn tạm thời thoát khỏi sự chờ đợi mệt mỏi. Nhưng bằng cách tái cấu trúc nhận thức và chủ động tìm giải pháp, bạn sẽ làm chủ được tiến độ công việc của chính mình một cách xuất sắc hơn.", isCorrect: false },
                    { text: "Có thể họ đang bận họp đột xuất hoặc gặp sự cố khẩn cấp chưa tiện trả lời. Mình sẽ gọi điện hoặc ghé qua chỗ họ xem sao.", rationale: "Tuyệt vời! Bạn đã phá vỡ lối mòn tư duy tiêu cực bằng cách giả định những ý định tốt hoặc tình huống khách quan ở người khác, từ đó đưa ra hành động chủ động và tích cực.", isCorrect: true }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let isAnswered = false;
        let userAnswers = new Array(quizData.length).fill(null); 

        const questionTextEl = document.getElementById('question-text');
        const optionsContainerEl = document.getElementById('options-container');
        const feedbackSectionEl = document.getElementById('feedback-section');
        const feedbackTitleEl = document.getElementById('feedback-title');
        const feedbackRationaleEl = document.getElementById('feedback-rationale');
        const questionCounterEl = document.getElementById('question-counter');
        const progressBarEl = document.getElementById('progress-bar'); 
        const questionSectionEl = document.getElementById('question-section');
        const resultSectionEl = document.getElementById('result-section');
        const prevButtonEl = document.getElementById('prev-button');
        const nextButtonNavEl = document.getElementById('next-button-nav');

        function initQuiz() {
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            questionSectionEl.classList.remove('hidden');
            resultSectionEl.classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            // Tự động cuộn lên đầu khung trắc nghiệm khi tải câu hỏi mới
            const quizContainer = document.getElementById('quiz-container');
            if (quizContainer) {
                quizContainer.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }

            // Check if current question was already answered
            isAnswered = userAnswers[currentQuestionIndex] !== null;
            const currentQ = quizData[currentQuestionIndex];
            
            // Update Progress
            questionCounterEl.textContent = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;
            const progressPercentage = ((currentQuestionIndex) / quizData.length) * 100;
            progressBarEl.style.width = `${progressPercentage}%`;

            // Set Question Text
            questionTextEl.textContent = currentQ.question;
            
            // Clear previous options and feedback
            optionsContainerEl.innerHTML = '';
            feedbackSectionEl.classList.add('hidden');

            // Render Options
            currentQ.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-4 rounded-xl border border-gray-200 hover:border-teal-500 hover:bg-teal-50 transition-all duration-200 focus:outline-none flex items-start group';
                
                // Add letter (A, B, C, D)
                const letter = String.fromCharCode(65 + index);
                
                button.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 font-semibold mr-4 group-hover:bg-teal-100 group-hover:text-teal-700 transition-colors">${letter}</span>
                    <span class="text-gray-700 font-medium pt-1">${option.text}</span>
                `;
                
                button.onclick = () => selectOption(index, button, option);
                optionsContainerEl.appendChild(button);
            });

            // Update navigation buttons state
            prevButtonEl.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === quizData.length - 1) {
                nextButtonNavEl.textContent = 'Hoàn thành';
            } else {
                nextButtonNavEl.textContent = 'Câu tiếp';
            }

            // Restore previous answer state if it exists
            if (isAnswered) {
                const previousAnswerIndex = userAnswers[currentQuestionIndex];
                const optionData = currentQ.options[previousAnswerIndex];
                
                // Temporarily unset isAnswered so selectOption can style the buttons
                isAnswered = false; 
                selectOption(previousAnswerIndex, optionsContainerEl.children[previousAnswerIndex], optionData);
            }
            
            // Small animation
            questionSectionEl.style.opacity = 0;
            setTimeout(() => { questionSectionEl.style.opacity = 1; }, 50);
        }

        function selectOption(selectedIndex, buttonEl, optionData) {
            if (isAnswered) return; // Prevent multiple selections for new answers
            isAnswered = true;
            userAnswers[currentQuestionIndex] = selectedIndex;

            const buttons = optionsContainerEl.querySelectorAll('button');
            
            // Disable all buttons and style them based on correctness
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                btn.classList.remove('hover:border-teal-500', 'hover:bg-teal-50', 'cursor-pointer');
                
                const optionInfo = quizData[currentQuestionIndex].options[idx];
                const letterSpan = btn.querySelector('span:first-child');
                
                if (idx === selectedIndex) {
                    if (optionInfo.isCorrect) {
                        btn.classList.add('bg-green-50', 'border-green-500', 'ring-2', 'ring-green-200');
                        letterSpan.classList.add('bg-green-500', 'text-white');
                        letterSpan.classList.remove('bg-gray-100', 'text-gray-600');
                    } else {
                        btn.classList.add('bg-blue-50', 'border-blue-400'); // Changed from Red to Blue for supportive feedback
                        letterSpan.classList.add('bg-blue-500', 'text-white');
                        letterSpan.classList.remove('bg-gray-100', 'text-gray-600');
                    }
                } else if (optionInfo.isCorrect) {
                    // Highlight the correct answer even if not selected
                    btn.classList.add('border-green-300', 'opacity-70');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            showFeedback(optionData);
        }

        function showFeedback(optionData) {
            feedbackSectionEl.classList.remove('hidden');
            
            if (optionData.isCorrect) {
                feedbackSectionEl.className = 'mt-8 p-6 rounded-xl border-l-4 border-green-500 bg-green-50 animate-fade-in-up';
                feedbackTitleEl.className = 'text-lg font-bold text-green-800 mb-2 flex items-center';
                feedbackTitleEl.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Tuyệt vời!`;
            } else {
                 // Supportive feedback style for incorrect answers
                feedbackSectionEl.className = 'mt-8 p-6 rounded-xl border-l-4 border-blue-400 bg-blue-50 animate-fade-in-up';
                feedbackTitleEl.className = 'text-lg font-bold text-blue-800 mb-2 flex items-center';
                feedbackTitleEl.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Góc nhìn thú vị`;
            }
            
            feedbackRationaleEl.textContent = optionData.rationale;
            
            // Scroll to the bottom of the container to show navigation buttons
            setTimeout(() => {
                const quizContainer = document.getElementById('quiz-container');
                quizContainer.scrollTo({
                    top: quizContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            questionSectionEl.classList.add('hidden');
            resultSectionEl.classList.remove('hidden');
            progressBarEl.style.width = `100%`;
        }

        function restartQuiz() {
            initQuiz();
        }

        // Add custom animation styles dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in-up {
                animation: fadeInUp 0.4s ease-out forwards;
            }
        `;
        document.head.appendChild(style);

        // Start Quiz on load
        window.onload = initQuiz;

    </script>
</body>
</html>
